<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Menu</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body{
      margin:0;
      background:#111;
      font-family:Arial,sans-serif;
    }

    h1{
      color:white;
      text-align:center;
      padding:15px;
    }

    model-viewer{
      width:100%;
      height:85vh;
    }
  </style>
</head>

<body>

<h1>🍕 AR Menu</h1>

<model-viewer
src="pizza%20(1).glb"
camera-controls
auto-rotate
ar
ar-modes="scene-viewer webxr quick-look"
shadow-intensity="1"
environment-image="neutral"
exposure="1">

<button slot="ar-button"
style="background:#ff5722;color:white;border:none;padding:12px 20px;border-radius:8px;font-size:16px;cursor:pointer;">
View in your Space
</button>

</model-viewer>

</body>
</html>
