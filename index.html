<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AR Pizza Menu</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body{
      margin:0;
      background:#111;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    model-viewer{
      width:100%;
      height:100vh;
    }
  </style>
</head>

<body>

<model-viewer
src="pizza%20(1).glb"
camera-controls
auto-rotate
ar
shadow-intensity="1">
</model-viewer>

</body>
</html>
